name: Daily competitive intel check

on:
  schedule:
    - cron: "0 7 * * *"   # her gün 07:00 UTC
  workflow_dispatch:        # elle de çalıştırılabilir

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check script
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python skills/competitive-intel/scripts/check.py

      - name: Copy findings to dashboard data
        run: |
          mkdir -p dashboard/data/findings
          cp ~/.hermes/competitive-intel/findings/*.json dashboard/data/findings/ 2>/dev/null || true

      - name: Commit and push findings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/findings/
          git diff --cached --quiet || git commit -m "chore: daily findings $(date -u +%Y-%m-%d)"
          git push
